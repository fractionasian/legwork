<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legwork — Running Route Planner</title>
    <meta name="description" content="Plan running routes with elevation-coloured paths, distance markers, and GPX export. Free, no account needed." />
    <meta property="og:title" content="Legwork — Running Route Planner" />
    <meta property="og:description" content="Plan running routes with elevation-coloured paths, Dijkstra routing on OpenStreetMap, and GPX export." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fractionasian.github.io/legwork/" />
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;&#129461;&lt;/text&gt;&lt;/svg&gt;" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="controls">
        <span class="app-title">&#129461; Legwork</span>
        <div class="address-wrapper">
            <input type="text" id="address-input" placeholder="Enter address..." autocomplete="off" />
            <div class="autocomplete-list" id="autocomplete-list"></div>
        </div>
        <button id="geocode-btn">Go</button>
        <select id="radius-select" title="How far to load paths from your start point">
            <option value="1000">Paths: 1 km</option>
            <option value="2000" selected>Paths: 2 km</option>
            <option value="5000">Paths: 5 km</option>
            <option value="10000">Paths: 10 km</option>
        </select>
        <select id="mode-select">
            <option value="loop" selected>&#8635; Loop</option>
            <option value="outback">&#8644; Out &amp; Back</option>
        </select>
        <span class="distance-display" id="distance-display">0.0 km</span>
        <span class="time-display" id="time-display"></span>
        <input type="text" id="pace-input" placeholder="Pace min/km" style="width:90px;flex:none" />
        <button id="reverse-btn" title="Reverse route direction">Reverse</button>
        <button id="clear-btn">Clear</button>
        <button id="export-btn">Export GPX</button>
    </div>
    <div class="info-banner" id="info-banner"></div>
    <div id="map"></div>
    <div class="elevation-stats" id="elevation-stats">
        Ascent: <span id="stat-ascent">&#8212;</span> &nbsp;
        Descent: <span id="stat-descent">&#8212;</span> &nbsp;
        Max gradient: <span id="stat-gradient">&#8212;</span>
    </div>
    <div id="elevation-container">
        <canvas id="elevation-canvas"></canvas>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
